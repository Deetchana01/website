<!DOCTYPE html>

<head>

    <style>

        body{

            background:#fff8f0;

        header{
            background:#8b0000;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#000000;
            padding:15px;

        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:18px;
            font-weight:bold;
        }

        .menu-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
            padding:40px;
        }

        .menu-item{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px gray;
            text-align:center;
        }

        .menu-item img{
            width:100%;
            height:220px;
        }

        .menu-item h3{
            color:#8b0000;
            padding:10px;
        }

        .menu-item p{
            padding-bottom:15px;
            font-size:18px;
            font-weight:bold;
        }

        footer{
            background:#8b0000;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>

</head>
